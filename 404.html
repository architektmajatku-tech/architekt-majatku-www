<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architekt Majątku</title>
  <script>
    // Github Pages SPA fallback dla parowania
    // Kiedy ktoś otwiera /pair/ABC123, github pages serwuje 404.html
    // bo plik nie istnieje. Ten skrypt wykrywa kod parowania w ścieżce
    // i przekierowuje na /pair/?code=ABC123 (gdzie pair/index.html czyta kod).
    (function() {
      var path = window.location.pathname;
      var match = path.match(/\/pair\/([A-Z0-9]{6})/i);
      if (match) {
        var code = match[1].toUpperCase();
        // Zachowaj parametr ?host= jeśli jest
        var search = window.location.search || '';
        var hostParam = '';
        if (search) {
          var hostMatch = search.match(/[?&]host=([^&]*)/);
          if (hostMatch) hostParam = '&host=' + hostMatch[1];
        }
        window.location.replace('/pair/?code=' + code + hostParam);
      }
    })();
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1b2d; color: #fff; padding: 60px 20px; text-align: center; margin: 0; min-height: 100vh; }
    h1 { color: #e2c27d; font-size: 28px; margin-bottom: 12px; font-weight: 900; letter-spacing: 1px; }
    p { color: #9ca3af; font-size: 16px; line-height: 24px; max-width: 400px; margin: 0 auto 16px; }
    a { display: inline-block; color: #0f1b2d; background: #e2c27d; text-decoration: none; font-weight: 900; padding: 14px 32px; border-radius: 12px; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>404 — Strona nie znaleziona</h1>
  <p>Sprawdź adres URL.</p>
  <a href="/">← Wróć na stronę główną</a>
</body>
</html>
